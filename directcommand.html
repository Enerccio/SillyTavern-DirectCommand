<div class="enerccio_directcommand_container">
    <div class="enerccio_directcommand_field">
        <label class="enerccio_directcommand_label">Prepend to prompt</label>
        <textarea class="enerccio_directcommand_textarea enerccio_directcommand_prepend" rows="2"></textarea>
    </div>
    <div class="enerccio_directcommand_field enerccio_directcommand_main_container">
        <label class="enerccio_directcommand_label">Main Prompt</label>
        <textarea class="enerccio_directcommand_textarea enerccio_directcommand_main" rows="3" placeholder="Type a message, or /? for help"></textarea>
    </div>
    <div class="enerccio_directcommand_field">
        <label class="enerccio_directcommand_label">Append to prompt</label>
        <textarea class="enerccio_directcommand_textarea enerccio_directcommand_append" rows="2"></textarea>
    </div>
    <div style="display: flex; justify-content: flex-end; gap: 8px; align-self: flex-end;">
        <button class="enerccio_directcommand_close menu_button red_button">Close</button>
        <button class="enerccio_directcommand_save menu_button">Save</button>
    </div>
</div>
